[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "alembic upgrade head && python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'"
healthcheckPath = "/api/latest"
healthcheckTimeout = 180
restartPolicyType = "on_failure"

[environments.production.variables]
PYTHONUNBUFFERED = "1"